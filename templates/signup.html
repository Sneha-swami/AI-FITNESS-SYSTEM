<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0">

    <title>Signup</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h2>Create Account</h2>

            <form action="/signup"
                  method="POST">

                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>

                <input type="email"
                       name="email"
                       placeholder="Email"
                       required>

                <input type="password"
                       name="password"
                       placeholder="Password"
                       required>

                <button type="submit">

                    Signup

                </button>

            </form>

            <p>

                Already have account?

                <a href="/login">

                    Login

                </a>

            </p>

        </div>

    </div>

</body>

</html>
